<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 宝可梦队伍策略师</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════ RESET & BASE ═══════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  color: #e0e0e0;
  overflow: hidden;
  position: relative;
}
/* Animated starfield background */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    radial-gradient(2px 2px at 20px 30px, #eee, transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
    radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,.6), transparent),
    radial-gradient(2px 2px at 130px 80px, #fff, transparent),
    radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,.7), transparent);
  background-size: 200px 200px;
  animation: twinkle 4s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}
@keyframes twinkle { 0% { opacity: .3; } 100% { opacity: .7; } }

/* ═══════════════════ LAYOUT ═══════════════════ */
.app-container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh; max-width: 1100px; margin: 0 auto;
  padding: 0 16px;
}

/* Header */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0 12px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  flex-shrink: 0;
}
.header-icon { font-size: 32px; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.header h1 {
  font-size: 22px; font-weight: 900;
  background: linear-gradient(135deg, #f093fb, #f5576c, #ffd86f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .model-badge {
  font-size: 11px; background: rgba(255,255,255,.08);
  padding: 2px 10px; border-radius: 20px; color: #aaa;
  margin-left: auto;
}

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 0;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

/* Messages */
.message {
  display: flex; gap: 10px; max-width: 88%;
  animation: msgIn .35s ease-out;
}
@keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.bot { align-self: flex-start; }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.avatar.user { background: linear-gradient(135deg, #667eea, #764ba2); }
.avatar.bot { background: linear-gradient(135deg, #f093fb, #f5576c); }

.bubble {
  padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7;
  position: relative;
}
.message.user .bubble {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-bottom-right-radius: 4px; color: #fff;
}
.message.bot .bubble {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.08);
  border-bottom-left-radius: 4px; color: #ddd;
}

/* ═══════ Input Bar ═══════ */
.input-bar {
  display: flex; gap: 10px; padding: 12px 0 20px;
  flex-shrink: 0;
}
.input-bar input {
  flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06); color: #eee; font-size: 14px; font-family: inherit;
  outline: none; transition: .25s;
}
.input-bar input:focus { border-color: #f5576c; box-shadow: 0 0 20px rgba(245,87,108,.2); }
.input-bar input::placeholder { color: #666; }
.input-bar button {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff; font-size: 20px; cursor: pointer; transition: .25s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.input-bar button:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(245,87,108,.4); }
.input-bar button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ═══════ Slideshow Processing Card ═══════ */
.processing-card {
  max-width: 88%; align-self: flex-start;
  animation: msgIn .35s ease-out;
}
.process-steps {
  background: rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 16px; padding: 16px; min-width: 360px;
  max-height: 380px; overflow-y: auto;
}
.process-steps::-webkit-scrollbar { width: 3px; }
.process-steps::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

.step {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  animation: stepIn .4s ease-out;
}
.step:last-child { border-bottom: none; }
@keyframes stepIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.step-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.step-content { flex: 1; font-size: 13px; line-height: 1.5; }
.step-title {
  font-weight: 600; color: #f093fb; font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
}
.step-body { color: #bbb; margin-top: 2px; word-break: break-word; }
.step-body.thinking-text { color: #ffd86f; font-style: italic; }
.step-body.code { font-family: monospace; font-size: 12px; color: #7ec8e3; }
.step-body.success { color: #69db7c; }
.step-body.error { color: #ff6b6b; }

.process-footer {
  margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888;
}
.process-footer .spinner {
  width: 14px; height: 14px; border: 2px solid rgba(245,87,108,.2);
  border-top-color: #f5576c; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ═══════ Pokemon Card ═══════ */
.pokemon-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  margin-top: 12px;
}
.pokemon-card {
  background: rgba(20,15,40,.7); border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.08);
  transition: .3s; cursor: default;
}
.pokemon-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
.pokemon-card .card-header {
  padding: 16px 12px 8px; text-align: center;
  background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
}
.pokemon-card .card-header img {
  width: 96px; height: 96px; image-rendering: auto; filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
}
.pokemon-card .card-body { padding: 4px 12px 12px; text-align: center; }
.pokemon-card .card-body .name {
  font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 6px;
}
.type-tag {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: #fff; margin: 2px 3px;
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
}
/* Type colors */
.type-normal { background: #A8A878; }
.type-fire { background: #F08030; }
.type-water { background: #6890F0; }
.type-electric { background: #F8D030; color:#333; }
.type-grass { background: #78C850; }
.type-ice { background: #98D8D8; color:#333; }
.type-fighting { background: #C03028; }
.type-poison { background: #A040A0; }
.type-ground { background: #E0C068; color:#333; }
.type-flying { background: #A890F0; }
.type-psychic { background: #F85888; }
.type-bug { background: #A8B820; }
.type-rock { background: #B8A038; }
.type-ghost { background: #705898; }
.type-dragon { background: #7038F8; }
.type-dark { background: #705848; }
.type-steel { background: #B8B8D0; color:#333; }
.type-fairy { background: #EE99AC; }

/* Stats bars */
.stats { padding: 0 12px 12px; }
.stat-row {
  display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px;
}
.stat-label { width: 42px; color: #999; flex-shrink: 0; text-align: right; }
.stat-bar-bg {
  flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden;
}
.stat-bar-fill {
  height: 100%; border-radius: 3px; transition: width .8s ease;
}
.stat-val { width: 28px; color: #ccc; font-weight: 600; text-align: right; flex-shrink: 0; }

/* ═══════ Team Grid (6) ═══════ */
.team-view { margin-top: 16px; }
.team-view h3 {
  font-size: 15px; color: #ffd86f; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.team-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
}
.team-slot {
  background: rgba(20,15,40,.5); border-radius: 14px; padding: 12px;
  text-align: center; border: 1px solid rgba(255,255,255,.06);
  transition: .3s;
}
.team-slot:hover { transform: translateY(-3px); border-color: rgba(255,255,255,.15); }
.team-slot img { width: 72px; height: 72px; }
.team-slot .name { font-size: 13px; font-weight: 600; color: #fff; margin-top: 4px; }
.team-slot .types { margin-top: 4px; }

/* ═══════ Charts ═══════ */
.chart-area { margin-top: 16px; }
.chart-area h3 { font-size: 15px; color: #ffd86f; margin-bottom: 10px; }
.chart-area img {
  max-width: 100%; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 8px 30px rgba(0,0,0,.3);
}

/* ═══════ Evolution Chain ═══════ */
.evolution-chain { margin-top: 16px; }
.evolution-chain h3 { font-size: 15px; color: #ffd86f; margin-bottom: 10px; }
.evo-tree {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.evo-node {
  text-align: center; background: rgba(20,15,40,.5);
  border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,.06);
  min-width: 90px;
}
.evo-node img { width: 56px; height: 56px; }
.evo-node .name { font-size: 12px; color: #ddd; font-weight: 600; }
.evo-arrow { font-size: 22px; color: #f5576c; }

/* ═══════ Type Coverage Matrix ═══════ */
.type-coverage { margin-top: 16px; }
.type-coverage h3 { font-size: 15px; color: #ffd86f; margin-bottom: 10px; }
.coverage-grid {
  display: grid; gap: 4px;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
}
.coverage-cell {
  padding: 6px 8px; border-radius: 8px; text-align: center;
  font-size: 11px; font-weight: 600;
}
.coverage-cell.super-effective { background: rgba(105,219,124,.2); color: #69db7c; border: 1px solid rgba(105,219,124,.3); }
.coverage-cell.resisted { background: rgba(255,107,107,.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,.2); }
.coverage-cell.immune { background: rgba(255,107,107,.25); color: #ff8787; border: 1px solid rgba(255,107,107,.3); }
.coverage-cell.neutral { background: rgba(255,255,255,.04); color: #888; border: 1px solid rgba(255,255,255,.05); }

/* ═══════ Bot message final answer styling ═══════ */
.final-answer { white-space: pre-wrap; line-height: 1.8; }
.final-answer strong { color: #ffd86f; }
.final-answer em { color: #7ec8e3; font-style: normal; }

/* ═══════ Responsive ═══════ */
@media (max-width: 640px) {
  .app-container { padding: 0 10px; }
  .message { max-width: 95%; }
  .pokemon-grid { grid-template-columns: repeat(2, 1fr); }
  .process-steps { min-width: unset; }
  .team-grid { grid-template-columns: repeat(3, 1fr); }
  .header h1 { font-size: 17px; }
}
</style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <header class="header">
    <span class="header-icon">🎮</span>
    <h1>宝可梦队伍策略师</h1>
    <span class="model-badge" id="modelBadge">loading…</span>
  </header>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Input Bar -->
  <form class="input-bar" id="inputForm">
    <input type="text" id="inputField" placeholder="输入你的对战需求，例如：推荐一队以火系为核心的队伍…" autofocus>
    <button type="submit" id="sendBtn">➤</button>
  </form>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  JavaScript — SSE Chat Client
// ══════════════════════════════════════════════════════════════

const chatArea = document.getElementById('chatArea');
const inputForm = document.getElementById('inputForm');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const modelBadge = document.getElementById('modelBadge');

let processing = false;

// ── Load config ──
fetch('/api/config').then(r => r.json()).then(cfg => {
  modelBadge.textContent = cfg.ready ? `🧠 ${cfg.model}` : '⚠️ 未就绪';
});

// ── Utility: scroll to bottom ──
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// ── Add a message bubble ──
function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
    <div class="bubble">${html}</div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

// ── Add processing card (slideshow container) ──
function addProcessingCard() {
  const div = document.createElement('div');
  div.className = 'processing-card';
  div.id = 'processingCard';
  div.innerHTML = `
    <div class="process-steps" id="processSteps">
      <div class="process-footer" id="processFooter">
        <div class="spinner"></div>
        <span>Agent 思考中…</span>
      </div>
    </div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

// ── Add a step to the processing slideshow ──
function addStep(icon, title, body, bodyClass = '') {
  const container = document.getElementById('processSteps');
  if (!container) return;
  // Remove footer from steps area, re-append at end
  const footer = document.getElementById('processFooter');
  const step = document.createElement('div');
  step.className = 'step';
  step.innerHTML = `
    <span class="step-icon">${icon}</span>
    <div class="step-content">
      <div class="step-title">${title}</div>
      <div class="step-body ${bodyClass}">${body}</div>
    </div>
  `;
  container.insertBefore(step, footer);
  scrollToBottom();
}

// ── Remove processing card ──
function removeProcessingCard() {
  const card = document.getElementById('processingCard');
  if (card) {
    card.style.transition = 'opacity .3s, transform .3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(.95)';
    setTimeout(() => card.remove(), 350);
  }
}

// ── Type colors ──
const TYPE_COLORS = {
  normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',
  grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',
  ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',
  rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',
  steel:'#B8B8D0',fairy:'#EE99AC'
};

// ── Render Pokemon card HTML ──
function pokemonCardHTML(p) {
  const types = p.types || [];
  const typesHTML = types.map(t =>
    `<span class="type-tag type-${t}">${t.toUpperCase()}</span>`
  ).join('');

  const stats = p.stats || {};
  const statOrder = ['hp','attack','defense','special-attack','special-defense','speed'];
  const statLabels = ['HP','ATK','DEF','SPA','SPD','SPE'];
  const statColors = ['#ff6b6b','#f08c5c','#f7d44a','#69db7c','#4ecdc4','#7ec8e3'];
  const sprite = p.sprites?.official_artwork || p.sprites?.front_default || '';

  const statsHTML = statOrder.map((k,i) => {
    const val = stats[k] || 0;
    const pct = Math.min(val / 255 * 100, 100);
    return `
      <div class="stat-row">
        <span class="stat-label">${statLabels[i]}</span>
        <div class="stat-bar-bg">
          <div class="stat-bar-fill" style="width:${pct}%;background:${statColors[i]}"></div>
        </div>
        <span class="stat-val">${val}</span>
      </div>
    `;
  }).join('');

  // Determine gradient color from primary type
  const primaryType = types[0] || 'normal';
  const gradColor = TYPE_COLORS[primaryType] || '#555';

  return `
    <div class="pokemon-card">
      <div class="card-header" style="background:linear-gradient(180deg,${gradColor}33,transparent)">
        <img src="${sprite}" alt="${p.name}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="name">${p.name.charAt(0).toUpperCase() + p.name.slice(1)}</div>
        <div>${typesHTML}</div>
      </div>
      <div class="stats">${statsHTML}</div>
    </div>
  `;
}

// ── Render team view ──
function teamViewHTML(pokemonList) {
  if (!pokemonList || pokemonList.length === 0) return '';
  const slots = pokemonList.slice(0, 6).map(p => {
    const sprite = p.sprites?.official_artwork || p.sprites?.front_default || '';
    const types = (p.types || []).map(t =>
      `<span class="type-tag type-${t}" style="font-size:10px">${t.toUpperCase()}</span>`
    ).join('');
    return `
      <div class="team-slot">
        <img src="${sprite}" alt="${p.name}" loading="lazy">
        <div class="name">${p.name.charAt(0).toUpperCase() + p.name.slice(1)}</div>
        <div class="types">${types}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="team-view">
      <h3>🌟 推荐队伍</h3>
      <div class="team-grid">${slots}</div>
    </div>
  `;
}

// ── Render evolution chain ──
function evolutionChainHTML(pokemonList) {
  // Display each pokemon with arrow between them
  const items = pokemonList.map((p, i) => {
    const sprite = p.sprites?.official_artwork || p.sprites?.front_default || '';
    return `
      <div class="evo-node">
        <img src="${sprite}" alt="${p.name}" loading="lazy">
        <div class="name">${p.name.charAt(0).toUpperCase() + p.name.slice(1)}</div>
      </div>
      ${i < pokemonList.length - 1 ? '<span class="evo-arrow">→</span>' : ''}
    `;
  }).join('');
  return `
    <div class="evolution-chain">
      <h3>📈 进化链</h3>
      <div class="evo-tree">${items}</div>
    </div>
  `;
}

// ── Render charts ──
function chartSectionHTML(charts) {
  if (!charts || charts.length === 0) return '';
  const imgs = charts.map(c =>
    `<img src="/${c}" alt="chart" loading="lazy" style="margin-bottom:12px">`
  ).join('');
  return `
    <div class="chart-area">
      <h3>📊 数据可视化</h3>
      ${imgs}
    </div>
  `;
}

// ── Render type coverage (simple version) ──
function typeCoverageHTML(pokemonList) {
  if (!pokemonList || pokemonList.length === 0) return '';
  const allTypes = Object.keys(TYPE_COLORS);
  const teamTypes = new Set();
  pokemonList.forEach(p => (p.types || []).forEach(t => teamTypes.add(t)));

  if (teamTypes.size === 0) return '';

  const cells = allTypes.map(t => {
    const cls = teamTypes.has(t) ? 'super-effective' : 'neutral';
    return `<div class="coverage-cell ${cls}">${t.toUpperCase()}</div>`;
  }).join('');

  return `
    <div class="type-coverage">
      <h3>⚔️ 属性覆盖</h3>
      <div class="coverage-grid">${cells}</div>
      <p style="font-size:12px;color:#888;margin-top:6px">绿色 = 队伍拥有的属性</p>
    </div>
  `;
}

// ── Render final structured message ──
function renderFinalMessage(answer, data) {
  const pokemon = data?.pokemon || [];
  const charts = data?.charts || [];

  let html = `<div class="final-answer">${escapeHtml(answer)}</div>`;

  // Team view (first 6 pokemon)
  if (pokemon.length > 0) {
    html += teamViewHTML(pokemon);
    html += typeCoverageHTML(pokemon);
  }

  // Individual pokemon cards
  if (pokemon.length > 0) {
    html += `<div class="team-view" style="margin-top:12px"><h3>🔍 宝可梦详情</h3><div class="pokemon-grid">`;
    pokemon.forEach(p => { html += pokemonCardHTML(p); });
    html += `</div></div>`;
  }

  // Charts
  html += chartSectionHTML(charts);

  return html;
}

// ── Escape HTML ──
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Send message ──
async function sendMessage() {
  const text = inputField.value.trim();
  if (!text || processing) return;

  inputField.value = '';
  processing = true;
  sendBtn.disabled = true;
  inputField.disabled = true;

  // Show user message
  addMessage('user', escapeHtml(text));

  // Show processing card
  addProcessingCard();

  // Collected data for final render
  const collectedPokemon = [];
  const collectedCharts = [];

  // SSE connection
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text }),
  });

  if (!response.ok) {
    removeProcessingCard();
    addMessage('bot', '❌ 请求失败，请稍后重试。');
    processing = false; sendBtn.disabled = false; inputField.disabled = false;
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let hasFinal = false;

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';

      for (const part of parts) {
        if (hasFinal) break;
        const lines = part.split('\n');
        let eventType = '';
        let dataStr = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7).trim();
          else if (line.startsWith('data: ')) dataStr = line.slice(6).trim();
          else if (line.startsWith(':')) continue; // comment
        }

        if (!dataStr) continue;
        let evt;
        try { evt = JSON.parse(dataStr); } catch { continue; }

        switch (eventType) {
          case 'thinking':
            addStep('🧠', '推理', escapeHtml(evt.content || ''), 'thinking-text');
            break;
          case 'tool_call':
            const args = evt.arguments || {};
            const argsStr = Object.keys(args).map(k => `${k}: ${JSON.stringify(args[k])}`).join(', ');
            addStep('🔧', `调用工具 ${evt.name}`, `<span class="code">${argsStr}</span>`);
            break;
          case 'tool_result':
            addStep('📦', evt.name, evt.summary || 'OK', 'success');
            break;
          case 'pokemon':
            if (evt.data && evt.data.id) {
              collectedPokemon.push(evt.data);
            }
            addStep('⭐', '宝可梦数据', `${evt.data?.name?.charAt(0).toUpperCase() + evt.data?.name?.slice(1) || ''} | ${(evt.data?.types || []).join(', ')}`, 'success');
            break;
          case 'chart':
            if (evt.path) collectedCharts.push(evt.path);
            addStep('📊', '图表', '已生成可视化图表', 'success');
            break;
          case 'final':
            hasFinal = true;
            removeProcessingCard();
            const finalData = evt.data || { pokemon: collectedPokemon, charts: collectedCharts };
            // Merge runtime collected data
            if (collectedPokemon.length > 0 && (!finalData.pokemon || finalData.pokemon.length === 0)) {
              finalData.pokemon = collectedPokemon;
            }
            if (collectedCharts.length > 0 && (!finalData.charts || finalData.charts.length === 0)) {
              finalData.charts = collectedCharts;
            }
            addMessage('bot', renderFinalMessage(evt.answer, finalData));
            break;
          case 'error':
            removeProcessingCard();
            addMessage('bot', `❌ ${escapeHtml(evt.message || '未知错误')}`);
            break;
        }
      }
    }
  } catch (e) {
    console.error('SSE error:', e);
    if (!hasFinal) {
      removeProcessingCard();
      addMessage('bot', '❌ 连接中断，请重试。');
    }
  }

  if (!hasFinal) {
    removeProcessingCard();
    addMessage('bot', '❌ 未收到完整响应，请重试。');
  }

  processing = false;
  sendBtn.disabled = false;
  inputField.disabled = false;
  inputField.focus();
}

// ── Event listeners ──
inputForm.addEventListener('submit', e => { e.preventDefault(); sendMessage(); });

// Auto-resize textarea behavior for input
</script>
</body>
